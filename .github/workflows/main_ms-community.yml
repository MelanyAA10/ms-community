name: Build and deploy Python app to Azure Web App - ms-community

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Zip source for deploy
        run: |
          zip -r release.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".venv/*" "venv/*" "env/*" \
            -x "*/__pycache__/*" "__pycache__/*" \
            -x "*.pyc" \
            -x ".python_packages/*" \
            -x "output.tar.zst" "oryx-manifest.toml"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'ms-community'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: release.zip